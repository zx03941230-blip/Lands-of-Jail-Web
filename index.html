<!DOCTYPE html>
<html lang="zh-Hant">
<head>

  <!-- =====================================

  ====================================== -->

<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">Lands of Jail</p>
      <h1>英雄攻略圖鑑</h1>
      <p class="subtitle">Hero Guide Database｜搜尋、分類、快速瀏覽</p>
    </div>
  </header>

  <main class="container">
    <button class="filter-toggle" onclick="toggleFilters()">🔍 搜尋 / 篩選</button>
    <section id="toolbar" class="toolbar">
      <div class="search-wrap">
        <label for="searchInput">搜尋英雄</label>
        <input id="searchInput" type="text" placeholder="輸入中文名、英文名、稀有度..." />
      </div>

      <div class="filter-wrap">
        <label for="rarityFilter">稀有度篩選</label>
        <select id="rarityFilter">
          <option value="ALL">全部</option>
        </select>
      </div>
      
      <div class="filter-wrap">
          <label for="roleFilter">兵種篩選</label>
          <select id="roleFilter">
            <option value="ALL">全部</option>
          </select>
        </div>

        <div class="filter-wrap">
          <label for="typeFilter">類型篩選</label>
          <select id="typeFilter">
            <option value="ALL">全部</option>
          </select>
        </div>
    </section>

    <section class="lang-switch-wrap">
      <button class="lang-btn active" data-lang="zh" onclick="setLanguage('zh', this)">中文</button>
      <button class="lang-btn" data-lang="en" onclick="setLanguage('en', this)">English</button>
    </section>

    <section class="view-tabs">
      <button class="view-tab active" data-view="ALL" onclick="setHeroView('ALL', this)">全部英雄</button>
      <button class="view-tab" data-view="FAVORITE" onclick="setHeroView('FAVORITE', this)">★ 收藏英雄</button>
      <button class="view-tab" data-view="RECENT" onclick="setHeroView('RECENT', this)">🕒 最近查看</button>
    </section>

    <section class="summary">
      <span id="heroCount">0</span>
      <span>位英雄</span>
    </section>

    <section id="heroGrid" class="hero-grid"></section>
  </main>

  <footer>
    Developed by Weber Chang
    <div id="siteVersion" class="site-version">版本載入中...</div>
  </footer>


  <script src="heroes.js?v=1.0.5"></script>
  <script>
  
    /* =========================================
       01. DOM Elements
    ========================================= */
    
    const heroGrid = document.getElementById('heroGrid');
    const searchInput = document.getElementById('searchInput');
    const rarityFilter = document.getElementById('rarityFilter');
    const heroCount = document.getElementById('heroCount');
    const roleFilter = document.getElementById('roleFilter');
    const typeFilter = document.getElementById('typeFilter');

    const rarityOrder = ['R', 'SR', 'SSR S-1', 'SSR S-2', 'SSR S-3', 'SSR S-4', 'SSR S-5', 'SSR S-6'];
    let currentHeroId = null;
    let favoriteHeroes = JSON.parse(localStorage.getItem("favoriteHeroes") || "[]");
    let currentHeroView = "ALL";
    let currentLang = localStorage.getItem("currentLang") || "zh";
    let recentHeroes = JSON.parse(localStorage.getItem("recentHeroes") || "[]");

    /* =========================================
       01A. Asset Helpers
    ========================================= */

    function imagePath(hero) {
      return `images/heroes/${hero.image}`;
    }

    /* =========================================
       02. Filter Options
    ========================================= */

    function buildRarityFilter() {
      const rarities = [...new Set(HEROES.map(h => h.rarity))]
        .sort((a, b) => rarityOrder.indexOf(a) - rarityOrder.indexOf(b));

      rarities.forEach(rarity => {
        const option = document.createElement('option');
        option.value = rarity;
        option.textContent = rarity;
        rarityFilter.appendChild(option);
      });
    }

    /* =========================================
       03. Render Hero Cards
    ========================================= */

    function renderHeroes() {
      const keyword = searchInput.value.trim().toLowerCase();
      const selectedRarity = rarityFilter.value;
      const selectedRole = roleFilter.value;
      const selectedType = typeFilter.value;

      const filtered = HEROES.filter(hero => {
        const text = `${hero.rarity} ${hero.nameZh} ${hero.nameEn} ${hero.role} ${hero.type}`.toLowerCase();

        const heroRoleZh = String(hero.role || "").split(/\n/)[0].trim();
        const heroTypeZh = String(hero.type || "").split(/\n/)[0].trim();

        const matchKeyword = !keyword || text.includes(keyword);
        const matchRarity = selectedRarity === 'ALL' || hero.rarity === selectedRarity;
        const matchRole = selectedRole === "ALL" || heroRoleZh === selectedRole;
        const matchType = selectedType === "ALL" || heroTypeZh === selectedType;
        
        const matchView =
            currentHeroView === "ALL" ||
            (currentHeroView === "FAVORITE" && favoriteHeroes.includes(hero.id)) ||
            (currentHeroView === "RECENT" && recentHeroes.includes(hero.id));

        return matchKeyword && matchRarity && matchRole && matchType && matchView;
      });

      heroCount.textContent = filtered.length;
      heroGrid.innerHTML = '';

      filtered.forEach(hero => {
        const card = document.createElement('article');
        card.className = 'hero-card';
        card.innerHTML = `
          <div class="image-box">
            <img src="${imagePath(hero)}" alt="${hero.nameZh}" loading="lazy" onerror="this.parentElement.classList.add('missing'); this.remove();" />
          </div>
          <div class="card-body">
            <span class="rarity ${hero.rarity.replaceAll(' ', '_')}">${hero.rarity}</span>
            <h2>${getHeroDisplayName(hero)}</h2>
            <p>${getHeroSubName(hero) || '&nbsp;'}</p>
          </div>
        `;

        card.addEventListener("click", () => openHeroModal(hero));
        heroGrid.appendChild(card);
      });
    }

    /* =========================================
       04. Hero Modal
    ========================================= */

    function openHeroModal(hero) {
    
        currentHeroId = hero.id;
        addRecentHero(hero.id);
        
        document.getElementById("heroModal").classList.add("active");

        document.getElementById("modalHeroImage").src = `images/heroes/${hero.image}`;
        document.getElementById("modalHeroImage").alt = hero.displayName || hero.nameZh;

        document.getElementById("modalRarity").textContent = hero.rarity || "-";
        document.getElementById("modalNameZh").textContent = getHeroDisplayName(hero);
        document.getElementById("modalNameEn").textContent = getHeroSubName(hero);
        document.getElementById("modalMeta").textContent =
            `${hero.role || "-"} ｜ ${hero.type || "-"} ｜ ${hero.obtainSource || "-"}`;

        document.getElementById("modalStats").innerHTML = `
            <div class="stat-item"><div class="stat-label">緝捕攻擊</div><div class="stat-value">${formatNumber(hero.stats?.arrestAtk)}</div></div>
            <div class="stat-item"><div class="stat-label">緝捕防禦</div><div class="stat-value">${formatNumber(hero.stats?.arrestDef)}</div></div>
            <div class="stat-item"><div class="stat-label">緝捕生命</div><div class="stat-value">${formatNumber(hero.stats?.arrestHp)}</div></div>
            <div class="stat-item"><div class="stat-label">戰爭攻防</div><div class="stat-value">${formatPercent(hero.stats?.warAtkDef)}</div></div>
        `;

        renderSkillList("modalGlobalBonus", [hero.globalBonus]);
        renderSkillList("modalArrestSkills", hero.arrestSkills);
        renderSkillList("modalWarSkills", hero.warSkills);
        renderEquipment("modalEquipment", hero.exclusiveEquipment);
        
        toggleEmptySection("modalGlobalBonus");
        toggleEmptySection("modalArrestSkills");
        toggleEmptySection("modalWarSkills");
        toggleEmptySection("modalEquipment");
        
        initMobileSections();
        
        const url = new URL(window.location);
        url.searchParams.set("id", hero.id);
        history.replaceState(null, "", url);
        
        updateFavoriteButton();
    }
    
    function toggleEmptySection(contentId) {
        const content = document.getElementById(contentId);
        if (!content) return;

        const section = content.closest(".modal-section");
        if (!section) return;

        const hasRealContent =
            content.querySelector(".skill-item") ||
            content.querySelector(".stat-item");

        section.style.display = hasRealContent ? "" : "none";
    }
        
    /* =========================================
       05. Mobile Accordion
    ========================================= */
    
    function toggleFilters() {
        document.getElementById("toolbar").classList.toggle("collapsed");
    }
    
    /* =========================================
       05. Mobile Accordion
    ========================================= */
    
    function initMobileSections() {
        const isMobile = window.innerWidth <= 768;
        const sections = document.querySelectorAll(".modal-section");

        sections.forEach((section, index) => {
            const title = section.querySelector("h3");

            if (!title) return;

            title.onclick = null;

            if (!isMobile) {
                section.classList.remove("collapsed");
                return;
            }

            title.onclick = () => {
                section.classList.toggle("collapsed");
            };

            // 手機預設：能力數值、全域加成展開，其餘收合
            if (index <= 1) {
                section.classList.remove("collapsed");
            } else {
                section.classList.add("collapsed");
            }
        });
    }
    
    /* =========================================
       06. Equipment Render
    ========================================= */
    
    function renderEquipment(targetId, equipment) {
        const target = document.getElementById(targetId);

        if (!equipment || !equipment.name || equipment.name === "-") {
            target.innerHTML = `<p class="empty-text">無資料</p>`;
            return;
        }

        let html = "";

        html += createSkillHTML({
            name: equipment.name,
            description: "專屬裝備",
            image: equipment.image
        });

        if (equipment.arrestSkill && equipment.arrestSkill.name && equipment.arrestSkill.name !== "-") {
            html += createSkillHTML({
                ...equipment.arrestSkill,
                description: getZhOnly(equipment.arrestSkill.description)
            });
        }

        if (equipment.warSkill && equipment.warSkill.name && equipment.warSkill.name !== "-") {
            html += createSkillHTML({
                ...equipment.warSkill,
                description: getZhOnly(equipment.warSkill.description)
            });
        }

        target.innerHTML = html;
    }
    
    /* =========================================
       07. Format Helpers
    ========================================= */
    
    function formatNumber(value) {
        if (value === undefined || value === null || value === "" || value === "-") {
            return "-";
        }

        const num = Number(value);

        if (Number.isNaN(num)) {
            return value;
        }

        return num.toLocaleString("en-US");
    }

    function formatPercent(value) {
        if (value === undefined || value === null || value === "" || value === "-") {
            return "-";
        }

        const num = Number(value);

        if (Number.isNaN(num)) {
            return value;
        }

        return `${(num * 100).toFixed(2)}%`;
    }

    /* =========================================
       08. Share Hero Link
       維護說明：
       - 複製目前網址
       - 搭配 ?id=Hxxx 可直接分享指定英雄
    ========================================= */
    function copyHeroLink() {
        const currentUrl = window.location.href;
        const btn = document.querySelector(".share-btn");

        navigator.clipboard.writeText(currentUrl).then(() => {
            const oldText = btn.textContent;

            btn.textContent = "✓ 已複製";

            setTimeout(() => {
                btn.textContent = oldText;
            }, 1500);
        }).catch(() => {
            alert("複製失敗，請手動複製網址。");
        });
    }

    function closeHeroModal() {
        document.getElementById("heroModal").classList.remove("active");

        const url = new URL(window.location);
        url.searchParams.delete("id");
        history.replaceState(null, "", url);
    }
    
    /* =========================================
       09. Back To Top
       維護說明：
       - 首頁狀態：回到網頁最上方
       - Modal 開啟狀態：回到 Modal 最上方
    ========================================= */
    function scrollModalTop() {
        const activeModalCard = document.querySelector(".modal-overlay.active .modal-card");

        if (activeModalCard) {
            activeModalCard.scrollTo({
                top: 0,
                behavior: "smooth"
            });
        } else {
            window.scrollTo({
                top: 0,
                behavior: "smooth"
            });
        }
    }

    /* =========================================
       10. Skill Render
    ========================================= */

    function renderSkillList(targetId, skills) {
        const target = document.getElementById(targetId);

        if (!skills || skills.length === 0) {
            target.innerHTML = `<p class="empty-text">無資料</p>`;
            return;
        }

        target.innerHTML = skills
            .filter(skill => skill.name && skill.name !== "-")
            .map(skill => createSkillHTML(skill))
            .join("");

        if (target.innerHTML.trim() === "") {
            target.innerHTML = `<p class="empty-text">無資料</p>`;
        }
    }

    function renderSingleSkill(targetId, item) {
        const target = document.getElementById(targetId);

        if (!item || !item.name || item.name === "-") {
            target.innerHTML = `<p class="empty-text">無資料</p>`;
            return;
        }

        target.innerHTML = createSkillHTML(item);
    }

    /* =========================================
       11. Skill Level System
    ========================================= */

    function createSkillHTML(skill) {
        const img = skill.image && !skill.image.endsWith("_-.png")
            ? `images/skills/${skill.image}`
            : "";

        const hasLevels = skill.template && skill.maxLevel && skill.levels;

        const defaultLv = skill.maxLevel || 1;
        const desc = hasLevels
            ? buildSkillDescription(skill, defaultLv)
            : (
                isEnglishMode()
                    ? (skill.descriptionEn || skill.description || skill.arrestDescription || skill.warDescription || "-")
                    : (skill.description || skill.arrestDescription || skill.warDescription || "-")
              );

        const levelButtons = hasLevels
            ? createLevelButtons(skill.maxLevel, defaultLv)
            : "";

        return `
            <div class="skill-item">
                ${
                    img
                    ? `<img src="${img}" alt="${skill.name}" onerror="this.style.display='none'">`
                    : ""
                }

                <div class="skill-info">
                    ${getSkillName(skill) ? `<h4>${getSkillName(skill)}</h4>` : ""}

                    ${levelButtons}

                    <p class="skill-desc"
                       data-template="${escapeHtml(getSkillTemplate(skill))}"
                       data-levels='${JSON.stringify(skill.levels || {})}'>
                       ${desc}
                    </p>
                </div>
            </div>
        `;
    }
    
    function createLevelButtons(maxLevel, activeLevel) {
        let html = `<div class="skill-levels">`;

        for (let i = 1; i <= maxLevel; i++) {
            html += `
                <button class="level-btn ${i === activeLevel ? "active" : ""}"
                        onclick="changeSkillLevel(this, ${i})">
                    Lv.${i}
                </button>
            `;
        }

        html += `</div>`;
        return html;
    }

    function changeSkillLevel(button, level) {
        const skillItem = button.closest(".skill-item");
        const descEl = skillItem.querySelector(".skill-desc");

        const template = descEl.dataset.template;
        const levels = JSON.parse(descEl.dataset.levels || "{}");

        descEl.innerHTML = applySkillTemplate(template, levels[level]);

        skillItem.querySelectorAll(".level-btn").forEach(btn => {
            btn.classList.remove("active");
        });

        button.classList.add("active");
    }

    function buildSkillDescription(skill, level) {
        return applySkillTemplate(getSkillTemplate(skill), skill.levels?.[level]);
    }

    function applySkillTemplate(template, values) {
        if (!template || !values) {
            return "-";
        }

        return escapeHtml(template)
            .replaceAll("{A}", `<span class="skill-var">${values.A ?? "-"}</span>`)
            .replaceAll("{B}", `<span class="skill-var">${values.B ?? "-"}</span>`)
            .replaceAll("{C}", `<span class="skill-var">${values.C ?? "-"}</span>`);
    }

    /* =========================================
       12. Text Helpers
    ========================================= */

    function escapeHtml(text) {
        return String(text)
            .replaceAll("&", "&amp;")
            .replaceAll('"', "&quot;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;");
    }
    
    function getZhOnly(text) {
        if (!text) return "-";

        return String(text)
            .split(/\n/)
            .map(line => line.trim())
            .filter(line => line)
            .filter(line => !/^[A-Za-z0-9\s.,%'"()\-:+/]+$/.test(line))
            .join("\n") || "-";
    }
    
    /* =========================================
       13. URL Hero Direct Open
    ========================================= */
    
    function openHeroFromUrl() {
        const params = new URLSearchParams(window.location.search);
        const heroId = params.get("id");

        if (!heroId) return;

        const hero = HEROES.find(h => h.id === heroId);

        if (hero) {
            openHeroModal(hero);
        }
    }
    
    /* =========================================
       14. Filter Builder
    ========================================= */
    
    function buildExtraFilters() {
        buildSelectFilter(roleFilter, HEROES.map(h => h.role));
        buildSelectFilter(typeFilter, HEROES.map(h => h.type));
    }
    
    function buildSelectFilter(selectEl, values) {
        const cleanValues = [...new Set(
            values
                .filter(v => v && v !== "-")
                .map(v => String(v).split(/\n/)[0])   // 只取第一行中文
                .map(v => v.trim())
                .filter(Boolean)
        )].sort();

        cleanValues.forEach(value => {
            const option = document.createElement("option");
            option.value = value;
            option.textContent = value;
            selectEl.appendChild(option);
        });
    }
    
    /* =========================================
       15. App Init 初始化語言按鈕
    ========================================= */

    window.addEventListener("DOMContentLoaded", () => {

        document.getElementById("heroModal").addEventListener("click", function (e) {
            if (e.target.id === "heroModal") {
                closeHeroModal();
            }
        });
        
        if (window.innerWidth <= 768) {
            document.getElementById("toolbar").classList.add("collapsed");
        }

        buildRarityFilter();
        buildExtraFilters();
        
        document.querySelectorAll(".lang-btn").forEach(btn => {
            btn.classList.toggle("active", btn.dataset.lang === currentLang);
        });
        
        renderHeroes();
        loadSiteVersion();
        openHeroFromUrl();

        searchInput.addEventListener('input', renderHeroes);
        rarityFilter.addEventListener('change', renderHeroes);
        roleFilter.addEventListener('change', renderHeroes);
        typeFilter.addEventListener('change', renderHeroes);

    });
    
    /* =========================================
       15A. Site Version
    ========================================= */
    
    function loadSiteVersion() {
        fetch(`version.json?v=${Date.now()}`)
            .then(res => res.json())
            .then(data => {
                document.getElementById("siteVersion").textContent =
                    `版本 v${data.version}｜更新 ${data.updatedAt}`;
            })
            .catch(() => {
                document.getElementById("siteVersion").textContent =
                    "版本資訊無法讀取";
            });
    }
    
    /* =========================================
       16. Favorites function
    ========================================= */
    
    function toggleFavoriteHero() {
        if (!currentHeroId) return;

        if (favoriteHeroes.includes(currentHeroId)) {
            favoriteHeroes = favoriteHeroes.filter(id => id !== currentHeroId);
        } else {
            favoriteHeroes.push(currentHeroId);
        }

        localStorage.setItem("favoriteHeroes", JSON.stringify(favoriteHeroes));
        updateFavoriteButton();
    }

    function updateFavoriteButton() {
        const btn = document.querySelector(".favorite-btn");
        if (!btn || !currentHeroId) return;

        if (favoriteHeroes.includes(currentHeroId)) {
            btn.textContent = "★ 已收藏";
            btn.classList.add("active");
        } else {
            btn.textContent = "☆ 收藏";
            btn.classList.remove("active");
        }
    }
    
    /* =========================================
       17. 上一位 / 下一位 function
    ========================================= */
    
    function getCurrentHeroIndex() {
        return HEROES.findIndex(hero => hero.id === currentHeroId);
    }

    function openPrevHero() {
        const index = getCurrentHeroIndex();
        if (index < 0) return;

        const prevIndex = index === 0 ? HEROES.length - 1 : index - 1;
        openHeroModal(HEROES[prevIndex]);
    }

    function openNextHero() {
        const index = getCurrentHeroIndex();
        if (index < 0) return;

        const nextIndex = index === HEROES.length - 1 ? 0 : index + 1;
        openHeroModal(HEROES[nextIndex]);
    }
    
    /* =========================================
       18. 最近查看 function
    ========================================= */
    
    function setHeroView(view, button) {
        currentHeroView = view;

        document.querySelectorAll(".view-tab").forEach(btn => {
            btn.classList.remove("active");
        });

        button.classList.add("active");

        renderHeroes();
    }

    function addRecentHero(heroId) {
        recentHeroes = recentHeroes.filter(id => id !== heroId);
        recentHeroes.unshift(heroId);
        recentHeroes = recentHeroes.slice(0, 20);

        localStorage.setItem("recentHeroes", JSON.stringify(recentHeroes));
    }
    
    /* =========================================
       19. Language Switch function
    ========================================= */
    
    function setLanguage(lang, button) {
        currentLang = lang;
        localStorage.setItem("currentLang", lang);

        document.querySelectorAll(".lang-btn").forEach(btn => {
            btn.classList.remove("active");
        });

        button.classList.add("active");

        renderHeroes();

        if (currentHeroId) {
            const hero = HEROES.find(h => h.id === currentHeroId);
            if (hero && document.getElementById("heroModal").classList.contains("active")) {
                openHeroModal(hero);
            }
        }
    }

    function isEnglishMode() {
        return currentLang === "en";
    }

    function getHeroDisplayName(hero) {
        return isEnglishMode()
            ? (hero.nameEn || hero.nameZh || "-")
            : (hero.nameZh || "-");
    }

    function getHeroSubName(hero) {
        return isEnglishMode()
            ? (hero.nameZh || "")
            : (hero.nameEn || "");
    }

    function getSkillTemplate(skill) {
        return isEnglishMode()
            ? (skill.templateEn || skill.template || "")
            : (skill.template || "");
    }

    function getSkillName(skill) {
        return isEnglishMode()
            ? ""
            : (skill.name || "-");
    }

  </script>

<!-- Hero Detail Modal -->
